services:
  mysql:
    image: mysql:8.4
    container_name: folios-mysql
    environment:
      MYSQL_DATABASE: folio
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: folio_user
      MYSQL_PASSWORD: folio_pass
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  folios:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: folios-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: folio
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

volumes:
  mysql_data:
